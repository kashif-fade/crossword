<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Daily Duo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      @keyframes petal-fall {
        0% {
          transform: translateY(-8vh) translateX(0) rotate(0deg);
          opacity: 0;
        }
        8% {
          opacity: 0.85;
        }
        92% {
          opacity: 0.7;
        }
        100% {
          transform: translateY(108vh) translateX(var(--drift, 40px)) rotate(300deg);
          opacity: 0;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .petal {
          animation: none !important;
          opacity: 0 !important;
        }
      }
    </style>
  </head>
  <body style="margin:0">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
